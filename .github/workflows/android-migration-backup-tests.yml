name: Android Migration and Backup Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run migration sanity unit test
        run: ./gradlew :app:testAbcDebugUnitTest --tests "*DatabaseVersionSanityTest"

  android-instrumentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run migration and backup smoke instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          script: |
            ./gradlew :app:connectedAbcDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.class=com.example.valuefinder.ValuePicsDatabaseMigrationTest"
            ./gradlew :app:connectedAbcDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.class=com.example.valuefinder.ValuePicsBackupRestoreSmokeTest"

